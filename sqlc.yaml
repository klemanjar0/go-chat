version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: migrations
    gen:
      go:
        package: sqlcgen
        out: internal/db/sqlcgen
        sql_package: pgx/v5
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
